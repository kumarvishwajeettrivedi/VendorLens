version: '3.9'

services:
  backend:
    build: ./backend
    container_name: vendorlens-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - vendorlens-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: vendorlens-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vendorlens-data:
